syntax = "proto3";
option go_package = "github.com/Kupfy/feeds-crawler/ingredientparser";

//package ingredientsparser;

service IngredientParser {
  rpc Parse(ParseRequest) returns (ParseResponse) {}
}

message ParseRequest {
  string raw = 1;
}

message ParseResponse {
  repeated ConfidenceText name = 1;
  optional ConfidenceText size = 2;
  repeated Amount amount = 3;
  optional ConfidenceText preparation = 4;
  optional ConfidenceText comment = 5;
  optional ConfidenceText purpose = 6;
}

message Amount {
  string quantity = 1;
  string quantity_max = 2;
  string unit = 3;
  string text = 4;
  bool singular = 5;
  bool approximate = 6;
  bool range = 7;
  float confidence = 8;
}

message ConfidenceText {
  string text = 1;
  float confidence = 2;
}
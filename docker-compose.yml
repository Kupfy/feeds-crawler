services:
  postgres:
    image: postgres:16-alpine
    container_name: feeds-crawler-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: Add init scripts
      - ./deploy/db/migration/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./deploy/db/migration/02_ingredients_insert.sql:/docker-entrypoint-initdb.d/02_ingredients_insert.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: feeds-crawler-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile.debug
      args:
        # Environment can be overridden: docker-compose build --build-arg ENV=dev
        ENV: ${ENV}
    container_name: feeds-crawler
    ports:
      - "${SERVER_PORT:-8080}:8080"
      - "2345:2345"  # Delve debugger port
    env_file:
      # Load environment-specific config file
      # Override with: ENV=dev docker-compose up
      - deploy/${ENV:-local}.env
    restart: unless-stopped
    networks:
      - app-network
    security_opt:
      - "apparmor=unconfined"  # Required for debugging
    cap_add:
      - SYS_PTRACE  # Required for debugging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  ingredient-parser:
    build: ./services/ingredients-nlp-server
    ports:
      - "50051:50051"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "grpc_health_probe", "-addr=:50051" ]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local